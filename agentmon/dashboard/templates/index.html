<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agentmon — Alert Review</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>agentmon</h1>
        <span class="subtitle">Alert Review Dashboard</span>
    </header>

    <main>
        <div class="status-bar">
            <span id="domainCount">Loading...</span>
            <label for="severityFilter">Min severity:</label>
            <select id="severityFilter" onchange="loadDomains()">
                <option value="">All</option>
                <option value="low">Low+</option>
                <option value="medium">Medium+</option>
                <option value="high">High+</option>
                <option value="critical">Critical</option>
            </select>
            <span id="lastRefresh"></span>
        </div>

        <table class="domain-table" id="domainTable">
            <thead>
                <tr>
                    <th>Domain</th>
                    <th>Alerts</th>
                    <th>Severities</th>
                    <th>Analyzers</th>
                    <th>FP</th>
                    <th>Ack</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="domainBody">
                <tr><td colspan="7" class="empty-state">Loading flagged domains...</td></tr>
            </tbody>
        </table>
    </main>

    <div class="toast" id="toast"></div>

    <script>
    const API = '';

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function api(method, path, body) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(API + path, opts);
        if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || res.statusText);
        }
        return res.json();
    }

    function severityBadges(severities) {
        if (!severities || !severities.length) return '';
        return severities.map(s =>
            `<span class="severity-badge ${s}">${s}</span>`
        ).join(' ');
    }

    function renderDomainRow(d) {
        const id = btoa(d.domain).replace(/[^a-zA-Z0-9]/g, '_');
        return `
        <tr id="row-${id}">
            <td><span class="domain-name" onclick="toggleDetail('${id}', '${d.domain}')">${d.domain}</span></td>
            <td>${d.alert_count}</td>
            <td>${severityBadges(d.severities)}</td>
            <td>${(d.analyzers || []).join(', ')}</td>
            <td>${d.false_positive_count || 0}</td>
            <td>${d.acknowledged_count || 0}</td>
            <td>
                <div class="actions">
                    <button class="btn btn-green" onclick="ackDomain('${d.domain}', '${id}')">Ack</button>
                    <button class="btn btn-yellow" onclick="fpDomain('${d.domain}', '${id}')">FP</button>
                    <button class="btn btn-red" onclick="allowlistDomain('${d.domain}', '${id}')">Allowlist</button>
                    <button class="btn btn-accent" onclick="llmReview('${d.domain}', '${id}')">LLM Review</button>
                </div>
            </td>
        </tr>
        <tr class="detail-row" id="detail-${id}" style="display:none">
            <td colspan="7">
                <div class="detail-panel" id="panel-${id}">
                    <div class="spinner"></div> Loading...
                </div>
            </td>
        </tr>`;
    }

    async function loadDomains() {
        try {
            const sev = document.getElementById('severityFilter').value;
            const qs = sev ? `?min_severity=${sev}` : '';
            const data = await api('GET', `/api/flagged-domains${qs}`);
            const tbody = document.getElementById('domainBody');
            const domains = data.domains || [];

            document.getElementById('domainCount').textContent = `${domains.length} flagged domains`;
            document.getElementById('lastRefresh').textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;

            if (domains.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No flagged domains found. All clear!</td></tr>';
                return;
            }

            tbody.innerHTML = domains.map(renderDomainRow).join('');
        } catch (e) {
            document.getElementById('domainBody').innerHTML =
                `<tr><td colspan="7" class="empty-state">Error: ${e.message}</td></tr>`;
        }
    }

    async function toggleDetail(id, domain) {
        const row = document.getElementById(`detail-${id}`);
        const mainRow = document.getElementById(`row-${id}`);
        if (row.style.display === 'none') {
            row.style.display = '';
            mainRow.classList.add('expanded');
            const panel = document.getElementById(`panel-${id}`);
            try {
                const data = await api('GET', `/api/domain/${encodeURIComponent(domain)}/clients`);
                const clients = data.clients || [];
                let html = '<h3>Querying Clients</h3>';
                if (clients.length) {
                    html += '<ul class="client-list">' +
                        clients.map(c => `<li>${c.client} — ${c.query_count} queries (${c.first_query} to ${c.last_query})</li>`).join('') +
                        '</ul>';
                } else {
                    html += '<p style="color:var(--text-muted)">No query data available</p>';
                }
                html += `<div id="llm-${id}"></div>`;
                panel.innerHTML = html;
            } catch (e) {
                panel.innerHTML = `<p style="color:var(--red)">Error: ${e.message}</p>`;
            }
        } else {
            row.style.display = 'none';
            mainRow.classList.remove('expanded');
        }
    }

    async function ackDomain(domain, id) {
        try {
            const data = await api('POST', `/api/domain/${encodeURIComponent(domain)}/acknowledge`);
            showToast(`Acknowledged ${data.acknowledged} alerts for ${domain}`);
            loadDomains();
        } catch (e) { showToast(`Error: ${e.message}`); }
    }

    async function fpDomain(domain, id) {
        try {
            const data = await api('POST', `/api/domain/${encodeURIComponent(domain)}/false-positive`);
            showToast(`Marked ${data.marked_false_positive} alerts as false positive for ${domain}`);
            loadDomains();
        } catch (e) { showToast(`Error: ${e.message}`); }
    }

    async function allowlistDomain(domain, id) {
        if (!confirm(`Add "${domain}" to allowlist? This will also mark existing alerts as false positives.`)) return;
        try {
            const data = await api('POST', `/api/domain/${encodeURIComponent(domain)}/allowlist`);
            showToast(data.message);
            loadDomains();
        } catch (e) { showToast(`Error: ${e.message}`); }
    }

    async function llmReview(domain, id) {
        // Ensure detail panel is open
        const row = document.getElementById(`detail-${id}`);
        if (row.style.display === 'none') {
            await toggleDetail(id, domain);
        }

        const container = document.getElementById(`llm-${id}`);
        if (!container) return;
        container.innerHTML = '<h3>LLM Analysis</h3><div class="llm-analysis"><span class="spinner"></span> Analyzing with Claude...</div>';

        try {
            const data = await api('POST', `/api/domain/${encodeURIComponent(domain)}/llm-review`);
            container.innerHTML = `<h3>LLM Analysis</h3><div class="llm-analysis">${data.analysis}</div>`;
        } catch (e) {
            container.innerHTML = `<h3>LLM Analysis</h3><div class="llm-analysis" style="color:var(--red)">Error: ${e.message}</div>`;
        }
    }

    // Initial load
    loadDomains();
    </script>
</body>
</html>
